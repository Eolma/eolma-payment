server:
  port: 8084

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/eolma_payment
    username: eolma
    password: eolma-local
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service

toss:
  payments:
    secret-key: ${TOSS_SECRET_KEY:test_sk_yourTestSecretKey}
    base-url: https://api.tosspayments.com/v1

payment:
  fee-rate: 0.035
  deadline-hours: 24

logging:
  level:
    root: INFO
    com.eolma.payment: DEBUG
    org.hibernate.SQL: DEBUG

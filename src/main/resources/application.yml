server:
  port: 8084

spring:
  application:
    name: eolma-payment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  kafka:
    consumer:
      group-id: payment-service

payment:
  fee-rate: 0.035
  deadline-hours: 24
